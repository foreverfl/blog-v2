name: Hacker News Pipeline

on:
  schedule:
    - cron: "0 19 * * *" # daily at 04:00 JST (19:00 UTC)
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYMMDD format, e.g. 260406). Defaults to today."
        required: false

permissions:
  contents: read

env:
  BACKEND_GO_URL: ${{ secrets.BACKEND_GO_URL }}
  BACKEND_RUST_URL: ${{ secrets.BACKEND_RUST_URL }}
  HACKERNEWS_SECRET: ${{ secrets.HACKERNEWS_SECRET }}
  IMPORT_SECRET: ${{ secrets.IMPORT_SECRET }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: hackernews-pipeline
      cancel-in-progress: false

    steps:
      - name: Resolve target date
        id: date
        env:
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            if [[ ! "$INPUT_DATE" =~ ^[0-9]{6}$ ]]; then
              echo "Invalid date format: expected YYMMDD (6 digits), got '$INPUT_DATE'" >&2
              exit 1
            fi
            echo "value=$INPUT_DATE" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(TZ=Asia/Tokyo date +'%y%m%d')" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if posts already exist
        id: check
        run: |
          DATE="${{ steps.date.outputs.value }}"
          RESP=$(curl -sf "${BACKEND_RUST_URL}/posts/trends/hackernews?lang=ko&page=1&per_page=100" || echo '{"posts":[]}')
          EXISTS=$(echo "$RESP" | jq -r --arg d "$DATE" '.posts[]? | select(.slug == $d) | .slug')
          if [ -n "$EXISTS" ]; then
            echo "Posts for $DATE already exist — skipping pipeline."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No posts found for $DATE — proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect articles from HN
        if: steps.check.outputs.skip == 'false'
        run: |
          DATE="${{ steps.date.outputs.value }}"
          echo "==> GET /hackernews/${DATE}"
          curl -sf "${BACKEND_GO_URL}/hackernews/${DATE}" \
            -H "Authorization: Bearer ${HACKERNEWS_SECRET}" \
            | jq 'length' | xargs -I{} echo "Collected {} articles."

      - name: Fetch articles
        if: steps.check.outputs.skip == 'false'
        run: |
          DATE="${{ steps.date.outputs.value }}"
          echo "==> POST /hackernews/fetch/${DATE}"
          curl -sf -X POST "${BACKEND_GO_URL}/hackernews/fetch/${DATE}" \
            -H "Authorization: Bearer ${HACKERNEWS_SECRET}"

          for i in $(seq 1 60); do
            sleep 30
            STATUS=$(curl -sf "${BACKEND_GO_URL}/hackernews/fetch/status/${DATE}" \
              -H "Authorization: Bearer ${HACKERNEWS_SECRET}")
            PHASE=$(echo "$STATUS" | jq -r '.phase')
            echo "  [$i] phase=${PHASE}"
            if [ "$PHASE" = "done" ]; then
              echo "Fetch complete."
              break
            elif [ "$PHASE" = "error" ]; then
              echo "Fetch failed: $(echo "$STATUS" | jq -r '.message')"
              exit 1
            fi
          done
          if [ "$PHASE" != "done" ]; then
            echo "Fetch timed out. Last phase=${PHASE}"
            exit 1
          fi

      - name: Summarize articles
        if: steps.check.outputs.skip == 'false'
        run: |
          DATE="${{ steps.date.outputs.value }}"
          echo "==> POST /hackernews/summarize/${DATE}"
          curl -sf -X POST "${BACKEND_GO_URL}/hackernews/summarize/${DATE}" \
            -H "Authorization: Bearer ${HACKERNEWS_SECRET}"

          for i in $(seq 1 60); do
            sleep 20
            STATUS=$(curl -sf "${BACKEND_GO_URL}/hackernews/summarize/status/${DATE}" \
              -H "Authorization: Bearer ${HACKERNEWS_SECRET}")
            PHASE=$(echo "$STATUS" | jq -r '.phase')
            echo "  [$i] phase=${PHASE}"
            if [ "$PHASE" = "done" ]; then
              echo "Summarize complete."
              break
            elif [ "$PHASE" = "error" ]; then
              echo "Summarize failed: $(echo "$STATUS" | jq -r '.message')"
              exit 1
            fi
          done
          if [ "$PHASE" != "done" ]; then
            echo "Summarize timed out. Last phase=${PHASE}"
            exit 1
          fi

      - name: Translate to Korean
        if: steps.check.outputs.skip == 'false'
        run: |
          DATE="${{ steps.date.outputs.value }}"
          echo "==> POST /hackernews/translate/${DATE}?lang=ko"
          curl -sf -X POST "${BACKEND_GO_URL}/hackernews/translate/${DATE}?lang=ko" \
            -H "Authorization: Bearer ${HACKERNEWS_SECRET}"

          for i in $(seq 1 60); do
            sleep 20
            STATUS=$(curl -sf "${BACKEND_GO_URL}/hackernews/translate/status/${DATE}?lang=ko" \
              -H "Authorization: Bearer ${HACKERNEWS_SECRET}")
            PHASE=$(echo "$STATUS" | jq -r '.phase')
            echo "  [$i] phase=${PHASE}"
            if [ "$PHASE" = "done" ]; then
              echo "Translate (ko) complete."
              break
            elif [ "$PHASE" = "error" ]; then
              echo "Translate (ko) failed: $(echo "$STATUS" | jq -r '.message')"
              exit 1
            fi
          done
          if [ "$PHASE" != "done" ]; then
            echo "Translate (ko) timed out. Last phase=${PHASE}"
            exit 1
          fi

      - name: Translate to Japanese
        if: steps.check.outputs.skip == 'false'
        run: |
          DATE="${{ steps.date.outputs.value }}"
          echo "==> POST /hackernews/translate/${DATE}?lang=ja"
          curl -sf -X POST "${BACKEND_GO_URL}/hackernews/translate/${DATE}?lang=ja" \
            -H "Authorization: Bearer ${HACKERNEWS_SECRET}"

          for i in $(seq 1 60); do
            sleep 20
            STATUS=$(curl -sf "${BACKEND_GO_URL}/hackernews/translate/status/${DATE}?lang=ja" \
              -H "Authorization: Bearer ${HACKERNEWS_SECRET}")
            PHASE=$(echo "$STATUS" | jq -r '.phase')
            echo "  [$i] phase=${PHASE}"
            if [ "$PHASE" = "done" ]; then
              echo "Translate (ja) complete."
              break
            elif [ "$PHASE" = "error" ]; then
              echo "Translate (ja) failed: $(echo "$STATUS" | jq -r '.message')"
              exit 1
            fi
          done
          if [ "$PHASE" != "done" ]; then
            echo "Translate (ja) timed out. Last phase=${PHASE}"
            exit 1
          fi

      - name: Generate cover image
        if: steps.check.outputs.skip == 'false'
        run: |
          DATE="${{ steps.date.outputs.value }}"
          echo "==> POST /hackernews/draw/${DATE}"
          DRAW_RESP=$(curl -sf -X POST "${BACKEND_GO_URL}/hackernews/draw/${DATE}" \
            -H "Authorization: Bearer ${HACKERNEWS_SECRET}")
          DRAW_OK=$(echo "$DRAW_RESP" | jq -r '.ok')
          if [ "$DRAW_OK" != "true" ]; then
            echo "Draw rejected: $(echo "$DRAW_RESP" | jq -r '.error // .message // "unknown"')"
            exit 1
          fi

          # draw is a single image generation; wait for it to finish
          for i in $(seq 1 20); do
            sleep 15
            STATUS=$(curl -sf "${BACKEND_GO_URL}/hackernews/status/${DATE}" \
              -H "Authorization: Bearer ${HACKERNEWS_SECRET}")
            echo "  [$i] $(echo "$STATUS" | jq -c '.')"
            if [ "$i" -ge 4 ]; then
              echo "Draw step waited 60s — proceeding."
              break
            fi
          done

      - name: Import to database
        if: steps.check.outputs.skip == 'false'
        run: |
          DATE="${{ steps.date.outputs.value }}"
          echo "==> POST /import/json?from=${DATE}"
          RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST "${BACKEND_RUST_URL}/import/json?from=${DATE}" \
            -H "X-Import-Secret: ${IMPORT_SECRET}")
          HTTP_CODE=$(echo "$RESP" | grep -oP 'HTTP_CODE:\K\d+')
          BODY=$(echo "$RESP" | sed '/HTTP_CODE:/d')
          echo "Response (HTTP ${HTTP_CODE}): ${BODY}"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Import request failed"
            exit 1
          fi
          JOB_ID=$(echo "$BODY" | jq -r '.job_id')
          echo "Import job started: ${JOB_ID}"

          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(curl -sf "${BACKEND_RUST_URL}/import/jobs/${JOB_ID}")
            STATE=$(echo "$STATUS" | jq -r '.status')
            echo "  [$i] status=${STATE}"
            if [ "$STATE" = "completed" ]; then
              echo "Import complete:"
              echo "$STATUS" | jq '.'
              break
            elif [ "$STATE" = "failed" ]; then
              echo "Import failed:"
              echo "$STATUS" | jq '.'
              exit 1
            fi
          done
          if [ "$STATE" != "completed" ]; then
            echo "Import timed out. Last status=${STATE}"
            exit 1
          fi
