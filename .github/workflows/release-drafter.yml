name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  draft:
    name: Update release draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
