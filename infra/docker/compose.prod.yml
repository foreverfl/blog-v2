services:
  flyway:
    image: flyway/flyway:12.0.0
    container_name: blog-flyway
    environment:
      TZ: Asia/Tokyo
      FLYWAY_URL: jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_SCHEMAS: public
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_LOCATIONS: filesystem:/flyway/migrations
    volumes:
      - ./migrations:/flyway/migrations:ro
    command: migrate

  # Auth (axum)
  auth-api:
    image: ghcr.io/foreverfl/blog-v2/auth-api:${IMAGE_TAG:-latest}
    container_name: blog-auth-api
    ports:
      - "8001:8001"
    env_file: .env.prod
    depends_on:
      flyway:
        condition: service_completed_successfully

  # Rust (axum)
  rust-api:
    image: ghcr.io/foreverfl/blog-v2/rust-api:${IMAGE_TAG:-latest}
    container_name: blog-rust-api
    ports:
      - "8002:8002"
    env_file: .env.prod
    depends_on:
      flyway:
        condition: service_completed_successfully

  # Go
  go-api:
    image: ghcr.io/foreverfl/blog-v2/go-api:${IMAGE_TAG:-latest}
    container_name: blog-go-api
    ports:
      - "8003:8003"
    env_file: .env.prod
    depends_on:
      flyway:
        condition: service_completed_successfully

  # Haskell
  haskell-api:
    image: ghcr.io/foreverfl/blog-v2/haskell-api:${IMAGE_TAG:-latest}
    container_name: blog-haskell-api
    ports:
      - "8004:8004"
    env_file: .env.prod
    depends_on:
      flyway:
        condition: service_completed_successfully

  # Observability stack
  loki:
    image: grafana/loki:3.7.0
    container_name: blog-loki
    volumes:
      - ./observability/loki/loki-config.prod.yml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yaml
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.10.3
    container_name: blog-tempo
    volumes:
      - ./observability/tempo/tempo-config.prod.yml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/config.yaml
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.15.0
    container_name: blog-alloy
    environment:
      GRAFANA_CLOUD_PROM_URL: ${GRAFANA_CLOUD_PROM_URL}
      GRAFANA_CLOUD_PROM_USER: ${GRAFANA_CLOUD_PROM_USER}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY}
      HOST_NAME: ${HOST_NAME}
      ENVIRONMENT: ${ENVIRONMENT}
      PROJECT_NAME: ${PROJECT_NAME}
    volumes:
      - ./observability/alloy/config.prod.alloy:/etc/alloy/config.alloy:ro
    command: run /etc/alloy/config.alloy
    depends_on:
      - loki
      - tempo
    restart: unless-stopped

volumes:
  loki_data:
  tempo_data: