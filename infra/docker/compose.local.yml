services:
  postgres:
    image: postgres:18.1
    container_name: blog-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:12.0.0
    container_name: blog-flyway
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: Asia/Tokyo
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_SCHEMAS: public
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_LOCATIONS: filesystem:/flyway/migrations
    volumes:
      - ../db/migrations:/flyway/migrations:ro
    command: migrate

  redis:
    image: redis:8.4.0
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  # Redis Insight
  redis-insight:
    image: redis/redisinsight:3.0
    container_name: redis-insight
    ports:
      - "5540:5540"
    depends_on:
      - redis
    volumes:
      - redisinsight_data:/data

  # Auth (axum)
  auth-api:
    image: rust:1.93
    container_name: blog-auth-api
    working_dir: /app
    ports:
      - "8001:8001"
    env_file: .env.local
    volumes:
      - ../../services/auth:/app
      - auth_cargo_cache:/usr/local/cargo/registry
      - auth_target_cache:/app/target
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: bash -c "cargo install cargo-watch && cargo watch -x run"

  # Rust (axum)
  rust-api:
    image: rust:1.93
    container_name: blog-rust-api
    working_dir: /app
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_PREFIX: ${S3_PREFIX}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-auto}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-52428800}
      IMPORT_SECRET: ${IMPORT_SECRET}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ../../services/rust:/app
      - rust_cargo_cache:/usr/local/cargo/registry
      - rust_target_cache:/app/target
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: bash -c "cargo install cargo-watch && cargo watch --poll -x run"

  # Go
  go-api:
    image: golang:1.26
    container_name: blog-go-api
    working_dir: /app
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    volumes:
      - ../../services/go:/app
      - go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: bash -c "go install github.com/air-verse/air@latest && air"

  # Haskell
  haskell-api:
    image: haskell:9.14
    container_name: blog-haskell-api
    working_dir: /app
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    volumes:
      - ../../services/haskell:/app
      - haskell_cabal_cache:/root/.cabal
      - haskell_cabal_store:/root/.local/state/cabal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: bash -c "cabal update && cabal install ghcid --overwrite-policy=always && ghcid --command='cabal repl' --run=Main.main --restart=blog-haskell-api.cabal"

  # Log viewer
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dozzle_data:/data

  # Observability stack
  loki:
    image: grafana/loki:3.7.0
    container_name: blog-loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yaml

  tempo:
    image: grafana/tempo:2.10.3
    container_name: blog-tempo
    ports:
      - "3200:3200"
    volumes:
      - ./observability/tempo/tempo-config.yml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/config.yaml

  alloy:
    image: grafana/alloy:v1.15.0
    container_name: blog-alloy
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
      - "12345:12345"  # Alloy UI / debug
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
    command: run /etc/alloy/config.alloy --server.http.listen-addr=0.0.0.0:12345
    depends_on:
      - loki
      - tempo
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.10.2
    container_name: blog-node-exporter
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  cadvisor:
    image: ghcr.io/google/cadvisor:0.56.2
    container_name: blog-cadvisor
    privileged: true
    volumes:
      - /var/run:/var/run:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: blog-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver

  grafana:
    image: grafana/grafana:12.4.0
    container_name: blog-grafana
    ports:
      - "9000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - tempo

volumes:
  redis_data:
  redisinsight_data:
  postgres_data:
  auth_cargo_cache:
  auth_target_cache:
  rust_cargo_cache:
  rust_target_cache:
  go_mod_cache:
  haskell_cabal_cache:
  haskell_cabal_store:
  dozzle_data:
  loki_data:
  tempo_data:
  grafana_data:
  prometheus_data: